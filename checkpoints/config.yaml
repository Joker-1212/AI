data: !!python/object:Module.Config.config.DataConfig
  batch_size: 8
  data_dir: ./data
  full_dose_dir: fd
  image_size:
  - 512
  - 512
  - 1
  low_dose_dir: qd
  normalize: true
  normalize_range:
  - -0.1
  - 0.1
  num_workers: 0
  pin_memory: false
  test_split: 0.1
  train_split: 0.8
  val_split: 0.1
diagnostics: !!python/object:Module.Config.config.DiagnosticsConfig
  analyze_overfitting: true
  check_activations: false
  check_dead_relu: true
  check_gradients: true
  check_learning_rate: true
  check_weights: true
  compute_loss_ratio: true
  compute_lpips: false
  compute_mae: false
  compute_ms_ssim: false
  compute_psnr: true
  compute_rmse: false
  compute_ssim: true
  dpi: 150
  enable_diagnostics: true
  generate_html_report: true
  generate_pdf_report: false
  model_diagnosis_frequency: 10
  report_dir: ./diagnostics/reports
  save_visualizations: true
  training_analysis_frequency: 10
  visualization_dir: ./diagnostics/visualizations
  visualization_frequency: 10
  visualize_samples: 5
model: !!python/object:Module.Config.config.ModelConfig
  activation: ReLU
  dropout: 0.1
  features:
  - 32
  - 64
  - 128
  - 256
  in_channels: 1
  model_name: WaveletDomainCNN
  out_channels: 1
  use_batch_norm: true
training: !!python/object:Module.Config.config.TrainingConfig
  checkpoint_dir: ./checkpoints
  device: cuda
  early_stopping_patience: 30
  gradient_clip_norm: null
  gradient_clip_value: 1.0
  learning_rate: 0.0001
  log_dir: ./logs/final_optimized_training
  log_interval: 30
  loss_function: MixedLoss
  loss_weights:
  - 1.0
  - 0.3
  - 0.05
  min_lr: 1.0e-06
  monitor_metrics:
  - loss
  - psnr
  multi_scale_weights:
  - 1.0
  - 0.5
  - 0.25
  num_epochs: 200
  optimizer: AdamW
  patience: 15
  save_interval: 20
  scheduler: ReduceLROnPlateau
  scheduler_factor: 0.5
  scheduler_gamma: 0.5
  scheduler_milestones:
  - 50
  - 100
  - 150
  scheduler_step_size: 20
  use_amp: true
  use_early_stopping: true
  use_multi_scale_loss: true
  warmup_epochs: 0
  weight_decay: 1.0e-05
windows_optimization: !!python/object:Module.Config.config.WindowsOptimizationConfig
  data_loader_type: windows_optimized
  disable_antivirus_interference: true
  disable_windows_defender_realtime: false
  enable_debug_logging: false
  enable_performance_monitoring: true
  enable_windows_optimization: true
  fallback_to_simple_loader: true
  garbage_collection_frequency: 100
  handle_windows_errors: true
  log_performance_metrics: true
  log_thread_activity: false
  max_memory_usage_mb: 4096
  max_retries: 3
  memory_allocation_strategy: balanced
  memory_map_cache_size: 1024
  monitor_interval_seconds: 30
  num_workers: 0
  optimization_level: balanced
  performance_log_dir: ./logs/windows_performance
  pin_memory: false
  platform_detection: windows
  preload_batch_count: 100
  preload_data_to_ram: false
  profile_data_loading: false
  retry_on_failure: true
  thread_pool_size: 4
  thread_priority: normal
  use_memory_mapped_files: true
  use_ssd_for_data: true
  use_thread_pool: true
  windows_10_plus: true
