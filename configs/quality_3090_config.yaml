# 3090 质量优先训练配置
# 目标：在 24GB 显存服务器上优先提升验证指标，而不是极限压缩训练时间

data:
  data_dir: "./data"
  low_dose_dir: "qd"
  full_dose_dir: "fd"
  image_size: [512, 512, 1]
  batch_size: 12
  num_workers: 6
  pin_memory: true
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  normalize: true
  normalize_range: [-0.1, 0.1]
  collect_statistics: false

model:
  model_name: "WaveletDomainCNN"
  in_channels: 1
  out_channels: 1
  features: [32, 64, 128, 256]
  dropout: 0.05
  use_batch_norm: true
  activation: "ReLU"
  wavelet_type: "contourlet"

training:
  learning_rate: 0.0001
  num_epochs: 200
  optimizer: "AdamW"
  weight_decay: 0.00001

  # 先用更稳定的重建导向损失，把感知项权重降到 0
  loss_function: "MixedLoss"
  loss_weights: [1.0, 0.2, 0.0]
  use_multi_scale_loss: false
  multi_scale_weights: [1.0, 0.5, 0.25]

  scheduler: "CosineWarmRestarts"
  patience: 15
  min_lr: 0.000001
  scheduler_factor: 0.5
  scheduler_step_size: 20
  scheduler_gamma: 0.5

  warmup_epochs: 5
  gradient_clip_value: 1.0
  gradient_clip_norm: null
  use_early_stopping: true
  early_stopping_patience: 40

  use_amp: true

  log_interval: 20
  save_interval: 20
  monitor_metrics: ["loss", "psnr", "ssim"]

  checkpoint_dir: "./models/quality_3090_checkpoints"
  log_dir: "./logs/quality_3090_training"
  device: "cuda"

diagnostics:
  enable_diagnostics: true

  compute_rmse: false
  compute_mae: false
  compute_psnr: true
  compute_ssim: true
  compute_ms_ssim: false
  compute_lpips: false

  visualize_samples: 4
  save_visualizations: true
  visualization_dir: "./diagnostics/visualizations"
  dpi: 150
  visualization_frequency: 10

  check_gradients: true
  check_weights: true
  check_activations: false
  check_dead_relu: true
  model_diagnosis_frequency: 10

  analyze_overfitting: true
  compute_loss_ratio: true
  check_learning_rate: true
  training_analysis_frequency: 10
